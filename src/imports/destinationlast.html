<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenity Spa — Partner Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
/* ── RARE Brand Bible Variables ─────────────────────────────────────────── */
:root{
  --cream:#FAF4EE;
  --linen:#F2DDD5;
  --rose:#C9897A;
  --gold:#D4AF7A;
  --terra:#A4594A;
  --dark:#2E1A1A;
  --mauve:#7A4A4A;
  --muted:#B09080;
  --border-soft:rgba(201,137,122,0.15);
  --border-mid:rgba(201,137,122,0.25);
  --green:#5a9a5a;
  --amber:#b8860b;
  --red:#c05050;
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--linen)}
::-webkit-scrollbar-thumb{background:var(--rose);border-radius:2px}
body{display:flex;min-height:100vh;background:var(--cream);font-family:'Jost',sans-serif;font-weight:300;color:var(--dark);overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar{
  width:236px;flex-shrink:0;
  background:var(--dark);
  border-right:1px solid rgba(212,175,122,0.12);
  display:flex;flex-direction:column;
  height:100vh;position:sticky;top:0;
  transition:width .3s;overflow:hidden;
}
#sidebar.collapsed{width:58px}
.logo-area{
  padding:24px 20px 20px;
  border-bottom:1px solid rgba(212,175,122,0.12);
  display:flex;align-items:center;gap:12px;
}
.logo-wordmark{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:400;
  letter-spacing:6px;
  color:var(--cream);
  padding-right:6px;
  flex-shrink:0;
}
.logo-wordmark span{color:var(--gold)}
.logo-text .sub{
  font-size:8px;color:rgba(212,175,122,0.4);
  letter-spacing:3px;text-transform:uppercase;
  margin-top:2px;
}
nav{flex:1;padding:12px 8px;overflow-y:auto}
.ni{
  display:flex;align-items:center;gap:11px;
  padding:10px 16px;border-radius:4px;
  cursor:pointer;transition:all .2s;
  color:rgba(250,244,238,0.45);
  font-size:12px;font-weight:300;letter-spacing:.5px;
  border:none;background:none;width:100%;text-align:left;white-space:nowrap;
}
.ni:hover{background:rgba(212,175,122,0.08);color:var(--gold)}
.ni.act{background:rgba(212,175,122,0.12);color:var(--gold)}
.ni .ic{font-size:13px;width:18px;text-align:center;flex-shrink:0;opacity:.7}
.ni.act .ic{opacity:1}
.sidebar-bottom{padding:16px 20px;border-top:1px solid rgba(212,175,122,0.1)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.collapse-btn{
  background:none;border:none;
  color:rgba(212,175,122,0.3);
  cursor:pointer;padding:10px;
  border-top:1px solid rgba(212,175,122,0.08);
  font-family:monospace;font-size:14px;
  text-align:center;width:100%;transition:color .2s;
}
.collapse-btn:hover{color:var(--gold)}

/* ── Main ───────────────────────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
.topbar{
  height:62px;
  background:var(--cream);
  border-bottom:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;flex-shrink:0;
}
.page-label{
  font-size:10px;color:var(--gold);
  letter-spacing:5px;text-transform:uppercase;
}
.topbar-right{display:flex;align-items:center;gap:14px}
.btn-ghost{
  background:transparent;color:var(--mauve);
  border:1px solid var(--rose);
  padding:8px 18px;
  cursor:pointer;
  font-family:'Jost',sans-serif;font-size:10px;
  font-weight:400;letter-spacing:3px;text-transform:uppercase;
  transition:all .3s;
}
.btn-ghost:hover{background:rgba(201,137,122,0.08);color:var(--rose)}
.notif-btn{
  background:none;
  border:1px solid var(--border-soft);
  color:var(--muted);
  width:36px;height:36px;
  cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:all .2s;
}
.notif-btn:hover{border-color:var(--rose);color:var(--rose)}
.ndot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:var(--terra);border:2px solid var(--cream)}
.top-divider{width:1px;height:20px;background:var(--border-soft)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:400;flex-shrink:0}
.notif-dd{
  position:absolute;top:46px;right:0;width:340px;
  background:var(--cream);
  border:1px solid var(--border-soft);
  z-index:100;overflow:hidden;
  box-shadow:0 12px 40px rgba(46,26,26,0.1);
}

/* ── Content ─────────────────────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;padding:32px 36px;background:var(--cream)}

/* ── Cards ───────────────────────────────────────────────────────────────── */
.card{
  background:#fff;
  border:1px solid var(--border-soft);
  padding:24px;
}
.sc{
  background:#fff;
  border:1px solid var(--border-soft);
  padding:24px;
  transition:all .3s;
}
.sc:hover{border-color:var(--rose);transform:translateY(-1px)}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn-primary{
  background:var(--dark);color:var(--cream);
  border:none;padding:10px 20px;
  cursor:pointer;
  font-family:'Jost',sans-serif;font-size:10px;
  font-weight:400;letter-spacing:3px;text-transform:uppercase;
  transition:all .3s;
}
.btn-primary:hover:not(:disabled){background:var(--terra)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-outline{
  background:transparent;border:0.5px solid var(--gold);color:var(--dark);
  padding:8px 16px;cursor:pointer;
  font-family:'Jost',sans-serif;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;transition:all .3s;
}
.btn-outline:hover{border-color:var(--rose);color:var(--rose)}
.btn-danger{
  background:rgba(192,80,80,.08);color:var(--red);
  border:1px solid rgba(192,80,80,.2);
  padding:6px 12px;cursor:pointer;
  font-family:'Jost',sans-serif;font-size:10px;letter-spacing:1px;
  transition:all .2s;
}
.btn-danger:hover{background:rgba(192,80,80,.15)}
.btn-warn{
  background:rgba(184,134,11,.08);color:var(--amber);
  border:1px solid rgba(184,134,11,.2);
  padding:6px 12px;cursor:pointer;
  font-family:'Jost',sans-serif;font-size:10px;letter-spacing:1px;
  transition:all .2s;
}
.btn-warn:hover{background:rgba(184,134,11,.15)}

/* ── Table ───────────────────────────────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{
  font-size:9px;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);padding:10px 14px;
  border-bottom:1px solid var(--border-soft);text-align:left;font-weight:400;
  background:var(--dark);
}
.tbl td{
  padding:13px 14px;
  border-bottom:1px solid var(--border-soft);
  font-size:13px;color:var(--mauve);font-weight:300;
}
.tbl tr:nth-child(odd) td{background:#fff}
.tbl tr:nth-child(even) td{background:var(--linen)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(201,137,122,0.05)}

/* ── Tags ────────────────────────────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;font-size:9px;font-weight:400;letter-spacing:1px;text-transform:uppercase}
.tag-green{background:rgba(90,154,90,.1);color:#3a7a3a;border:1px solid rgba(90,154,90,.2)}
.tag-amber{background:rgba(184,134,11,.1);color:#8a6200;border:1px solid rgba(184,134,11,.2)}
.tag-red{background:rgba(192,80,80,.1);color:var(--red);border:1px solid rgba(192,80,80,.2)}
.tag-blue{background:rgba(164,89,74,.08);color:var(--terra);border:1px solid rgba(164,89,74,.2)}
.tag-gray{background:rgba(176,144,128,.08);color:var(--muted);border:1px solid var(--border-soft)}

/* ── Input ───────────────────────────────────────────────────────────────── */
.inp{
  background:var(--cream);
  border:1px solid var(--border-soft);
  color:var(--dark);
  padding:10px 14px;
  font-family:'Jost',sans-serif;font-size:13px;font-weight:300;
  outline:none;transition:border .2s;width:100%;
}
.inp:focus{border-color:var(--terra)}
select.inp option{background:#fff}
.lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(46,26,26,.6);
  display:flex;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(4px);
}
.modal{
  background:var(--cream);
  border:1px solid var(--border-soft);
  padding:32px;width:520px;
  max-height:88vh;overflow-y:auto;
  animation:slideIn .2s ease;
  box-shadow:0 24px 64px rgba(46,26,26,.15);
}
@keyframes slideIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Toast ───────────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--dark);
  border:1px solid rgba(212,175,122,0.2);
  padding:14px 20px;
  font-size:12px;color:var(--cream);font-weight:300;
  display:flex;gap:10px;align-items:center;
  z-index:300;animation:slideIn .25s ease;
  box-shadow:0 8px 32px rgba(46,26,26,.2);max-width:320px;
}

/* ── Progress bar ────────────────────────────────────────────────────────── */
.pb{height:3px;background:var(--linen);overflow:hidden}
.pf{height:100%;transition:width .6s ease}

/* ── Stats grid ──────────────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:2px}
.stat-card{background:#fff;padding:24px 22px}
.stat-label{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.stat-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:300;color:var(--dark);line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:6px;font-weight:300}

/* ── Section heading ─────────────────────────────────────────────────────── */
.sec-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;color:var(--dark);margin-bottom:16px}
.sec-title em{font-style:italic;color:var(--rose)}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:10px}

/* ── Booking grid ────────────────────────────────────────────────────────── */
.bk-row{
  display:grid;
  grid-template-columns:80px 1fr 160px 120px 90px 100px 100px 130px;
  align-items:center;padding:13px 16px;
  border-bottom:1px solid var(--border-soft);gap:8px;
  font-size:12px;
}
.bk-row:nth-child(even){background:var(--linen)}
.bk-row:nth-child(odd){background:#fff}
.bk-row:hover{background:rgba(201,137,122,0.05)}

/* ── Slot pills ──────────────────────────────────────────────────────────── */
.slot-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;font-size:10px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;margin:3px;
  border:1px solid var(--border-soft);color:var(--mauve);
  background:#fff;
}
.slot-pill:hover{border-color:var(--rose);color:var(--rose)}
.slot-full{opacity:.4;cursor:not-allowed;background:var(--linen)}
.slot-hold{border-color:rgba(212,175,122,.4);color:var(--gold)}

/* ── Review card ─────────────────────────────────────────────────────────── */
.review-card{background:#fff;border:1px solid var(--border-soft);padding:20px;margin-bottom:10px}

/* ── Divider line ────────────────────────────────────────────────────────── */
.gold-line{height:1px;background:linear-gradient(to right,var(--gold),rgba(212,175,122,0.1));margin-bottom:20px}
</style>
</head>

</div>

<div class="toast" id="toast" style="display:none"></div>

function fmtCountdown(ms){
  if(ms<=0)return'Expired';
  const m=Math.floor(ms/60000);
  const s=Math.floor((ms%60000)/1000);
  return`${m}:${String(s).padStart(2,'0')}`;
}

const VENUE_ACCEPT_WINDOW_MS=2*60*60*1000; // 2 hours for pay-at-venue

function addSoftHold(svcId,time,svcName){
  const id='sh'+Date.now();
  softHolds.push({id,svcId,time,svc:svcName,createdAt:Date.now()});
  svcs=svcs.map(s=>s.id!==svcId?s:{...s,slots:s.slots.map(sl=>sl.time!==time?sl:{...sl,holds:sl.holds+1})});
  return id;
}

function releaseSoftHold(holdId){
  const h=softHolds.find(x=>x.id===holdId);
  if(!h)return;
  softHolds=softHolds.filter(x=>x.id!==holdId);
  svcs=svcs.map(s=>s.id!==h.svcId?s:{...s,slots:s.slots.map(sl=>sl.time!==h.time?sl:{...sl,holds:Math.max(0,sl.holds-1)})});
}

function checkHoldExpiry(){
  const now=Date.now();
  let changed=false;
  softHolds=softHolds.filter(h=>{
    if(now-h.createdAt>HOLD_EXPIRY_MS){
      svcs=svcs.map(s=>s.id!==h.svcId?s:{...s,slots:s.slots.map(sl=>sl.time!==h.time?sl:{...sl,holds:Math.max(0,sl.holds-1)})});
      addNotif('warning',`Soft hold released: ${h.svc} · ${h.time} — slot is available again`);
      changed=true;return false;
    }
    return true;
  });
  if(changed)render();
}

function checkPendingExpiry(){
  const now=Date.now();
  let changed=false;
  bks=bks.map(b=>{
    if(b.status!=='pending'||!b.createdAt)return b;
    const isVenue=b.pay==='pay-at-venue';
    const window=isVenue?VENUE_ACCEPT_WINDOW_MS:ACCEPT_WINDOW_MS;
    if(now-b.createdAt>window){
      svcs=svcs.map(s=>s.id!==b.svcId?s:{...s,slots:s.slots.map(sl=>sl.time!==b.time?sl:{...sl,conf:Math.max(0,sl.conf-1)})});
      if(isVenue){
        addNotif('booking',`Pay-at-venue booking ${b.id} expired — ${b.name} was not confirmed within 2h. Slot released.`);
        log('Auto-Expired',b.id,'2h venue accept window passed');
      } else {
        addNotif('booking',`Booking ${b.id} auto-cancelled — accept window expired. ${b.name} has been refunded.`);
        log('Auto-Cancelled',b.id,'30-min accept window expired');
      }
      changed=true;
      return{...b,status:'cancelled',outcome:'auto_expired'};
    }
    return b;
  });
  if(changed)render();
}

  const disputed=bks.filter(b=>b.dispute&&['open','under_review'].includes(b.dispute.status));
  const now=Date.now();

  const makePendingRow=(b,windowMs)=>{
    const elapsed=now-b.createdAt;
    const remaining=Math.max(0,windowMs-elapsed);
    const pct=Math.round(Math.min(100,(elapsed/windowMs)*100));
    const urgent=(b.pay!=='pay-at-venue'&&remaining<5*60*1000)||(b.pay==='pay-at-venue'&&remaining<10*60*1000);

        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.4rem;color:${urgent?'var(--red)':'var(--terra)'}" id="cd-${b.id}">${fmtCountdown(remaining)}</div>

      </div>
    </div>`;
  };

${!settings.autoAccept&&pendingOnline.length>0?`

function renderWaitlist(){
  const wlItems=[];
  svcs.forEach(s=>s.slots.forEach(sl=>{

      const c=custs.find(x=>x.id===cid);
      wlItems.push({svc:s.name,svcId:s.id,time:sl.time,cid,cName:c?.name||cid,pos:i+1,full:sl.conf+sl.holds>=sl.cap});

function updateBookingPayUI(){
  const isOnline=document.querySelector('input[name="bk-paymode"]:checked')?.value==='online';
  const paidRow=document.getElementById('bk-paid-row');
  const onlineLbl=document.getElementById('bk-pm-online-lbl');
  const venueLbl=document.getElementById('bk-pm-venue-lbl');
  if(paidRow) paidRow.style.display=isOnline?'none':'flex';
  if(onlineLbl) onlineLbl.style.border=`1px solid ${isOnline?'var(--rose)':'var(--border-soft)'}`;
  if(onlineLbl) onlineLbl.style.background=isOnline?'rgba(201,137,122,.06)':'transparent';
  if(venueLbl)  venueLbl.style.border=`1px solid ${!isOnline?'var(--rose)':'var(--border-soft)'}`;
  if(venueLbl)  venueLbl.style.background=!isOnline?'rgba(201,137,122,.06)':'transparent';
}

function updateSlots(){
  const svc=svcs.find(s=>s.id===document.getElementById('bk-svc')?.value);
  const sel=document.getElementById('bk-slot');
  if(!svc||!sel) return;
  sel.innerHTML=svc.slots.map(sl=>`<option value="${sl.time}" ${sl.conf+sl.holds>=sl.cap?'disabled':''}>${sl.time} (${sl.conf}/${sl.cap})${sl.conf+sl.holds>=sl.cap?' — Full':''}</option>`).join('');
}

function confirmNewBooking(){
  const cid=document.getElementById('bk-cust')?.value;
  const svcId=document.getElementById('bk-svc')?.value;
  const time=document.getElementById('bk-slot')?.value;
  const thId=document.getElementById('bk-th')?.value;
  const payMode=document.querySelector('input[name="bk-paymode"]:checked')?.value||'online';
  const markPaidNow=payMode==='venue'&&document.getElementById('bk-mark-paid')?.checked;
  if(!cid||!svcId||!time||!thId){toast('Please fill in all fields','⚠');return;}
  const svc=svcs.find(s=>s.id===svcId),cust=custs.find(c=>c.id===cid),th=staff.find(s=>s.id===thId);
  if(!svc||!cust||!th) return;
  const slot=svc.slots.find(sl=>sl.time===time);
  if(!slot||slot.conf+slot.holds>=slot.cap){toast('This slot is currently full.','⚠');return;}
  const id='BK'+String(bks.length+100).padStart(3,'0');
  const isVenue=payMode==='venue';
  const payStatus=isVenue?(markPaidNow?'paid':'pay-at-venue'):'paid';
  const status=settings.autoAccept&&!isVenue?'confirmed':'pending';
  bks.push({id,cid,name:cust.name,svcId,svc:svc.name,th:th.name.split(' ')[0]+' '+th.name.split(' ')[1][0]+'.',thId,time,date:TODAY,status,pay:payStatus,payMode,amt:svc.price,outcome:null,createdAt:Date.now(),dispute:null});
  svcs=svcs.map(s=>s.id!==svcId?s:{...s,slots:s.slots.map(sl=>sl.time!==time?sl:{...sl,conf:sl.conf+1})});
  custs=custs.map(c=>c.id!==cid?c:{...c,visits:c.visits+1,spend:c.spend+svc.price});
  log('Booking Created',id,`${cust.name} · ${svc.name} · ${time} · ${payMode}`);
  addNotif('booking',`Booking ${status==='confirmed'?'confirmed':'pending'}: ${cust.name} · ${svc.name} · ${time}`);
  closeModal();render();
  toast(`${id} ${status==='confirmed'?'confirmed':'pending vendor acceptance'} for ${cust.name}`,'✦');
}

function cancelBk(id){
  const b=bks.find(x=>x.id===id);if(!b||b.status==='cancelled')return;
  bks=bks.map(x=>x.id!==id?x:{...x,status:'cancelled',outcome:'cancelled_by_vendor'});
  svcs=svcs.map(s=>{if(s.id!==b.svcId)return s;return{...s,slots:s.slots.map(sl=>sl.time!==b.time?sl:{...sl,conf:Math.max(0,sl.conf-1)})};});
  log('Booking Cancelled',id,`${b.name} · ${b.svc} · ${b.time}`);
  addNotif('booking',`Booking ${id} cancelled: ${b.name}`);
  render();toast(`Booking ${id} cancelled — slot reopened`,'✦');
}
function markPaid(id){
  const b=bks.find(x=>x.id===id);
  bks=bks.map(x=>x.id!==id?x:{...x,pay:'paid'});
  log('Payment Received',id,`${b?.name} · ${fmtINR(b?.amt||0)}`);
  addNotif('payment',`Payment received: ${b?.name} · ${fmtINR(b?.amt||0)}`);
  render();toast(`Payment recorded for ${id}`,'✦');
}
function markCompleted(id){
  const b=bks.find(x=>x.id===id);if(!b)return;
  bks=bks.map(x=>x.id!==id?x:{...x,status:'completed',outcome:'completed'});
  const commAmt=Math.round(b.amt*COMMISSION_RATE);
  const existingPO=payouts.find(p=>p.status==='pending');
  if(existingPO){
    payouts=payouts.map(p=>p.status!=='pending'?p:{...p,totalRev:p.totalRev+b.amt,commission:p.commission+commAmt,netPayout:p.netPayout+(b.amt-commAmt)});
  }
  log('Service Completed',id,`${b.name} · ${b.svc} · commission ₹${commAmt}`);
  addNotif('payment',`Service completed: ${b.name} · Commission ₹${commAmt} due`);
  render();toast(`Marked complete — ₹${commAmt} commission logged`,'✦');
}
function markNoShow(id){
  const b=bks.find(x=>x.id===id);if(!b)return;
  bks=bks.map(x=>x.id!==id?x:{...x,status:'no-show',outcome:'no_show'});
  custs=custs.map(c=>c.id!==b.cid?c:{...c,noShows:(c.noShows||0)+1});
  svcs=svcs.map(s=>{if(s.id!==b.svcId)return s;return{...s,slots:s.slots.map(sl=>sl.time!==b.time?sl:{...sl,conf:Math.max(0,sl.conf-1)})};});
  log('No-Show',id,`${b.name} · ${b.svc} · trust score reduced`);
  addNotif('warning',`No-show recorded: ${b.name} — trust score updated`);
  render();toast(`No-show recorded for ${b.name}`,'⚠');
}

function handlePhotoUpload(event){
  const files=Array.from(event.target.files);
  const current=settings.photos||[];
  const remaining=8-current.length;
  files.slice(0,remaining).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      settings={...settings,photos:[...(settings.photos||[]),e.target.result]};

  });
  if(files.length>remaining) toast(`Only ${remaining} slot${remaining!==1?'s':''} left — some photos skipped`,'⚠');

function generateTimeSlots(startH,endH,intervalMin,cap){
  const slots=[];
  for(let h=startH;h<endH;h++){
    for(let m=0;m<60;m+=intervalMin){
      if(h===endH-1&&m>0&&intervalMin>30)break;
      const hh=h%12||12;
      const mm=String(m).padStart(2,'0');
      const ampm=h<12?'AM':'PM';
      slots.push({time:`${hh}:${mm} ${ampm}`,cap,conf:0,holds:0,wl:[]});
    }
  }
  return slots;
}

function confirmServiceSave(svcId){
  const name=document.getElementById('svc-name')?.value?.trim();
  const cat=document.getElementById('svc-cat')?.value;
  const dur=document.getElementById('svc-dur')?.value;
  const price=parseInt(document.getElementById('svc-price')?.value||0);
  const cap=parseInt(document.getElementById('svc-cap')?.value||1);
  const start=parseInt(document.getElementById('svc-start')?.value||9);
  const end=parseInt(document.getElementById('svc-end')?.value||21);
  const interval=parseInt(document.getElementById('svc-interval')?.value||60);
  if(!name){toast('Please enter a service name','⚠');return;}
  if(!price||price<1){toast('Please enter a valid price','⚠');return;}
  if(end<=start){toast('End hour must be after start hour','⚠');return;}
  const newSlots=generateTimeSlots(start,end,interval,cap);
  if(svcId){
    svcs=svcs.map(s=>s.id!==svcId?s:{...s,name,cat,dur,price,slots:newSlots.map(sl=>{
      const existing=s.slots.find(e=>e.time===sl.time);
      return existing?{...existing,cap}:sl;
    })});
    log('Service Updated',svcId,`${name} · ${cat} · ${fmtINR(price)}`);
    toast(`${name} updated`,'✦');
  } else {
    const id='s'+Date.now();
    svcs=[...svcs,{id,name,cat,dur,price,active:true,slots:newSlots}];
    log('Service Added',id,`${name} · ${cat} · ${fmtINR(price)}`);
    toast(`${name} added to services`,'✦');
  }
  addNotif('booking',`Service ${svcId?'updated':'created'}: ${name}`);
  closeModal();render();
}

function deactivateStaff(id){
  const s=staff.find(x=>x.id===id);if(!s)return;
  const activeBks=bks.filter(b=>b.thId===id&&b.date>=TODAY&&!['cancelled','completed','no-show'].includes(b.status));
  const pendingBks=activeBks.filter(b=>b.status==='pending');
  const confirmedBks=activeBks.filter(b=>b.status!=='pending');
  if(confirmedBks.length>0){
    toast(`${s.name} has ${confirmedBks.length} confirmed booking${confirmedBks.length>1?'s':''}. Reassign before removing. <span onclick="dismissToast();navigate('bookings')" style="color:var(--gold);cursor:pointer;text-decoration:underline;margin-left:6px">View Bookings →</span>`,'⚠');return;
  }
  if(pendingBks.length>0){
    toast(`${s.name} has ${pendingBks.length} pending booking${pendingBks.length>1?'s':''} awaiting acceptance. Decline or reassign first. <span onclick="dismissToast();navigate('bookings')" style="color:var(--gold);cursor:pointer;text-decoration:underline;margin-left:6px">View Bookings →</span>`,'⚠');return;
  }
  staff=staff.map(x=>x.id!==id?x:{...x,inactive:true,removedOn:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})});
  log('Staff Deactivated',id,`${s.name} removed from roster`);
  addNotif('warning',`${s.name} removed from bookable roster`);
  render();toast(`${s.name} removed — they will no longer appear as a bookable option`,'✦');
}

function saveBankDetails(){
  const get=id=>document.getElementById('bank-'+id)?.value?.trim()||'';
  const method=document.querySelector('input[name="bank-method"]:checked')?.value||'bank';
  if(method==='bank'){
    const acct=get('account');
    const ifsc=get('ifsc').toUpperCase();
    if(!acct){toast('Please enter account number','⚠');return;}
    if(acct.length<9||acct.length>18||!/^\d+$/.test(acct)){toast('Account number must be 9–18 digits','⚠');return;}
    if(!ifsc){toast('Please enter IFSC code','⚠');return;}
    if(!/^[A-Z]{4}0[A-Z0-9]{6}$/.test(ifsc)){toast('Invalid IFSC format — should be like SBIN0001234','⚠');return;}
    if(!get('name')){toast('Please enter account holder name','⚠');return;}
  } else {
    const upi=get('upi');
    if(!upi){toast('Please enter UPI ID','⚠');return;}
    if(!/^[\w.\-]+@[\w]+$/.test(upi)){toast('Invalid UPI ID format — should be like name@upi','⚠');return;}
  }
  settings={...settings,bank:{
    accountName:get('name'),accountNumber:get('account'),
    ifsc:get('ifsc').toUpperCase(),bankName:get('bankName'),
    upiId:get('upi'),preferredMethod:method
  }};
  log('Bank Details Saved','Settings','Payout routing updated');
  addNotif('payment','Bank details updated — payouts will be routed to new account');
  render();toast('Bank details saved — payouts will be routed here','✦');
}

  <div style="display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--border-soft)">
    <div style="font-size:11px;font-weight:400;color:var(--dark);min-width:130px;flex-shrink:0">${k}</div>
    <div style="font-size:12px;color:var(--mauve);line-height:1.6">${v}</div>
  </div>`).join('')}
</div>`;
}

function renderBoostModal(){
  let sel='p2';
  const pkgCards=AD_PACKAGES.map(p=>`
  <div id="pkg-${p.id}" onclick="selectPkg('${p.id}')" style="border:1px solid ${p.id===sel?'var(--gold)':'var(--border-soft)'};background:${p.id===sel?'rgba(212,175,122,.08)':'#fff'};padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;margin-bottom:8px">
    ${p.badge?`<div style="position:absolute;top:-9px;right:10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;background:var(--dark);color:var(--gold);padding:2px 10px">${p.badge}</div>`:''}
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;color:var(--dark)">${p.label}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${p.duration}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">~${p.views.toLocaleString('en-IN')} views · ~${p.clicks} profile clicks</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.4rem;color:var(--terra)">${fmtINR(p.price)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">one-time</div>
      </div>
    </div>
  </div>`).join('');

  return `
<div style="margin-bottom:20px">
  <div style="font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Sponsored Placement</div>
  <div style="font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:400;color:var(--dark)">Boost My <em style="font-style:italic;color:var(--rose)">Listing</em></div>
</div>
<div style="height:1px;background:linear-gradient(to right,var(--gold),rgba(212,175,122,.1));margin-bottom:20px"></div>

<div style="font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Choose a package</div>
${pkgCards}

<div style="height:1px;background:var(--border-soft);margin:16px 0"></div>
<div style="font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Payment method</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
  ${['UPI','Card','Wallet','Net banking'].map((m,i)=>`
  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--mauve);padding:10px 12px;border:1px solid ${i===0?'var(--rose)':'var(--border-soft)'};background:${i===0?'rgba(201,137,122,.06)':'#fff'};transition:all .2s" id="pm-lbl-${i}">
    <input type="radio" name="boost-pm" value="${m}" ${i===0?'checked':''} onchange="highlightPM(${i})" style="accent-color:var(--rose)"> ${m}
  </label>`).join('')}
</div>
<div style="background:rgba(90,154,90,.06);border:1px solid rgba(90,154,90,.2);padding:10px 14px;font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:16px">
  Ad spend is charged separately from your booking payouts. Billed immediately. Cancel within 1 hour for a full refund of unused days.
</div>
<div style="display:flex;gap:10px">
  <button class="btn-primary" style="flex:1" id="boost-pay-btn" onclick="confirmBoost()">Pay ${fmtINR(AD_PACKAGES.find(p=>p.id===sel)?.price||1200)} & Go Live</button>
  <button class="btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
</div>`;
}

function selectPkg(id){
  AD_PACKAGES.forEach(p=>{
    const el=document.getElementById('pkg-'+p.id);
    if(!el)return;
    el.style.border=p.id===id?'1px solid var(--gold)':'1px solid var(--border-soft)';
    el.style.background=p.id===id?'rgba(212,175,122,.08)':'#fff';
  });
  const pkg=AD_PACKAGES.find(p=>p.id===id);
  const btn=document.getElementById('boost-pay-btn');
  if(btn&&pkg) btn.textContent=`Pay ${fmtINR(pkg.price)} & Go Live`;
  document.getElementById('boost-pay-btn')?.setAttribute('data-pkg',id);
}

function highlightPM(idx){
  for(let i=0;i<4;i++){
    const el=document.getElementById('pm-lbl-'+i);
    if(!el)continue;
    el.style.border=i===idx?'1px solid var(--rose)':'1px solid var(--border-soft)';
    el.style.background=i===idx?'rgba(201,137,122,.06)':'#fff';
  }
}

function confirmBoost(){
  const btn=document.getElementById('boost-pay-btn');
  const pkgId=btn?.getAttribute('data-pkg')||'p2';
  const pm=document.querySelector('input[name="boost-pm"]:checked')?.value||'UPI';
  const pkg=AD_PACKAGES.find(p=>p.id===pkgId);
  if(!pkg)return;
  const now=new Date();
  const end=new Date(now.getTime()+parseInt(pkg.duration)*24*60*60*1000);
  const fmt=d=>d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  const id='AD'+String(adCampaigns.length+1).toString().padStart(3,'0');
  adCampaigns.unshift({
    id,pkg:pkgId,label:pkg.label,price:pkg.price,
    status:'active',
    startDate:fmt(now),endDate:fmt(end),
    views:0,clicks:0,impressions:0,paidVia:pm
  });
  log('Ad Campaign Started',id,`${pkg.label} · ${fmtINR(pkg.price)} · paid via ${pm}`);
  addNotif('payment',`Campaign live: ${pkg.label} · ${fmtINR(pkg.price)} charged via ${pm}`);
  closeModal();render();
  toast(`${pkg.label} is now live — your listing is sponsored for ${pkg.duration}`,'◭');
}

function renderAdDetailModal(adId){
  const a=adCampaigns.find(x=>x.id===adId);
  if(!a)return'<p>Not found</p>';
  const ctr=a.views>0?((a.clicks/a.views)*100).toFixed(1):'—';
  const pkg=AD_PACKAGES.find(p=>p.id===a.pkg);
  const lift=a.views>0?Math.round((a.views/BASELINE_WEEKLY.views-1)*100):0;
  return `
<div style="margin-bottom:20px">
  <div style="font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Campaign Details</div>
  <div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400;color:var(--dark)">${a.label}</div>
  <div style="font-size:11px;color:var(--muted);margin-top:3px">${a.startDate} — ${a.endDate}</div>
</div>
<div style="height:1px;background:linear-gradient(to right,var(--gold),rgba(212,175,122,.1));margin-bottom:16px"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:16px">
  ${[['Views',a.views.toLocaleString('en-IN'),'var(--dark)'],['Clicks',a.clicks,'var(--terra)'],['Impressions',a.impressions.toLocaleString('en-IN'),'var(--dark)'],['CTR',ctr+'%','var(--gold)']].map(([k,v,c])=>`
  <div style="background:var(--linen);padding:14px;text-align:center">
    <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:5px">${k}</div>
    <div style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:300;color:${c}">${v}</div>
  </div>`).join('')}
</div>
${a.views>0?`<div style="background:${lift>0?'rgba(90,154,90,.06)':'var(--linen)'};border:1px solid ${lift>0?'rgba(90,154,90,.2)':'var(--border-soft)'};padding:12px 16px;margin-bottom:16px">
  <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Views vs organic baseline</div>
  <div style="font-size:14px;font-weight:400;color:${lift>0?'#3a7a3a':'var(--muted)'}">
    ${lift>0?`+${lift}% more views compared to an average non-boosted week (${BASELINE_WEEKLY.views} views)`:`Data still accumulating — baseline is ${BASELINE_WEEKLY.views} views/week`}
  </div>
</div>`:''}
<div style="display:grid;gap:0">
  ${[['Budget',fmtINR(a.price)],['Package',pkg?.duration||'—'],['Payment method',a.paidVia],['Status',a.status.charAt(0).toUpperCase()+a.status.slice(1)]].map(([k,v])=>`
  <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-soft)">
    <span style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold)">${k}</span>
    <span style="font-size:13px;color:var(--mauve);font-weight:300">${v}</span>
  </div>`).join('')}
</div>
<button class="btn-ghost" style="width:100%;margin-top:20px" onclick="closeModal()">Close</button>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function render(){
  const map={overview:renderOverview,bookings:renderBookings,services:renderServices,customers:renderCustomers,staff:renderStaff,analytics:renderAnalytics,payouts:renderPayouts,marketing:renderMarketing,waitlist:renderWaitlist,documents:renderDocuments,reviews:renderReviews,settings:renderSettings,audit:renderAudit};
  document.getElementById('content').innerHTML=(map[currentNav]||renderOverview)();
}

// ─── INIT ─────────────────────────────────────────────────────────────────
buildNav();render();

// Live countdown ticker — updates every second
setInterval(()=>{
  const now=Date.now();
  // Update all pending booking countdowns (both online and venue)
  bks.filter(b=>b.status==='pending'&&b.createdAt).forEach(b=>{
    const el=document.getElementById('cd-'+b.id);
    if(el){
      const windowMs=b.pay==='pay-at-venue'?VENUE_ACCEPT_WINDOW_MS:ACCEPT_WINDOW_MS;
      const remaining=Math.max(0,windowMs-(now-b.createdAt));
      el.textContent=fmtCountdown(remaining);
      const urgent=(b.pay!=='pay-at-venue'&&remaining<5*60*1000)||(b.pay==='pay-at-venue'&&remaining<10*60*1000);
      el.style.color=urgent?'var(--red)':'var(--terra)';
    }
  });
  // Check pending expiry every 10s
  if(Math.floor(now/1000)%10===0) checkPendingExpiry();
  // Check soft hold expiry every 30s
  if(Math.floor(now/1000)%30===0) checkHoldExpiry();
},1000);
</script>
</body>
